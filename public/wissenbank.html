<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wissenbank — GKV Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #fff; --fg: #000; --muted: #888; --border: #e0e0e0; --hover: #f5f5f5; --accent: #f8f8f8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--fg); }
  .logo-mark { width: 32px; height: 32px; background: var(--fg); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--bg); font-weight: 700; font-size: 14px; }
  .logo-text { font-size: 15px; font-weight: 600; }
  .logo-sub { font-size: 11px; color: var(--muted); }

  .stats { font-size: 12px; color: var(--muted); display: flex; gap: 16px; }
  .stats span { display: flex; align-items: center; gap: 4px; }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .tree { list-style: none; }
  .tree-root { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .tree-root svg { width: 16px; height: 16px; }

  .file-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .file-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .file-header {
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .file-header:hover { background: var(--hover); }

  .file-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .file-icon svg { width: 16px; height: 16px; color: var(--muted); }

  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .file-title { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .file-meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-shrink: 0; }

  .chevron { width: 16px; height: 16px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
  .file-item.open .chevron { transform: rotate(90deg); }

  .file-content {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .file-item.open .file-content { display: block; }

  .markdown-body {
    font-size: 13px;
    line-height: 1.7;
    padding-top: 16px;
    color: #333;
  }
  .markdown-body h1 { font-size: 16px; font-weight: 700; margin: 16px 0 8px; }
  .markdown-body h2 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; color: var(--fg); }
  .markdown-body h3 { font-size: 13px; font-weight: 600; margin: 10px 0 4px; }
  .markdown-body p { margin: 4px 0; }
  .markdown-body ul, .markdown-body ol { padding-left: 20px; margin: 4px 0; }
  .markdown-body li { margin: 2px 0; }
  .markdown-body strong { font-weight: 600; }
  .markdown-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
  .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .markdown-body th { background: var(--accent); font-weight: 600; }
  .markdown-body blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--muted); margin: 8px 0; font-style: italic; }
  .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .markdown-body code { background: var(--accent); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .markdown-body a { color: var(--fg); text-decoration: underline; text-underline-offset: 2px; }

  @media (max-width: 600px) {
    .file-meta { display: none; }
    .stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-mark">G</div>
    <div>
      <div class="logo-text">Wissenbank</div>
      <div class="logo-sub">GKV Assistent</div>
    </div>
  </a>
  <div class="stats">
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      10 Dateien
    </span>
    <span>24.9 KB</span>
  </div>
</header>

<div class="container">
  <div class="tree-root">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    wissenBank/
  </div>

  <div id="tree"></div>
</div>

<script>
const files = [
  { name: "01_gkv_system.md", title: "Das GKV-System — Überblick", lines: 58, bytes: 2400 },
  { name: "02_versicherungsarten.md", title: "Versicherungsarten & Mitgliedschaft", lines: 65, bytes: 2800 },
  { name: "03_beitraege.md", title: "Beitragssätze & Grenzen", lines: 72, bytes: 3200 },
  { name: "04_leistungen_vorsorge.md", title: "Leistungen & Vorsorge", lines: 90, bytes: 3800 },
  { name: "05_krankengeld.md", title: "Krankengeld", lines: 58, bytes: 2600 },
  { name: "06_pflege.md", title: "Pflege & Pflegeversicherung", lines: 75, bytes: 3200 },
  { name: "07_zahngesundheit.md", title: "Zahngesundheit", lines: 68, bytes: 2900 },
  { name: "08_schwangerschaft_familie.md", title: "Schwangerschaft, Geburt & Familie", lines: 70, bytes: 3000 },
  { name: "09_digitale_services.md", title: "Digitale Services in der GKV", lines: 62, bytes: 2700 },
  { name: "10_rechte_beschwerden.md", title: "Rechte & Beschwerden", lines: 85, bytes: 3600 },
];

const tree = document.getElementById('tree');

files.forEach(f => {
  const item = document.createElement('div');
  item.className = 'file-item';
  item.innerHTML = `
    <div class="file-header" onclick="this.parentElement.classList.toggle('open'); loadContent(this.parentElement, '${f.name}')">
      <div class="file-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-title">${f.title}</div>
      </div>
      <div class="file-meta">
        <span>${f.lines} Zeilen</span>
        <span>${(f.bytes / 1024).toFixed(1)} KB</span>
      </div>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="file-content"><div class="markdown-body">Wird geladen…</div></div>
  `;
  tree.appendChild(item);
});

async function loadContent(item, filename) {
  const body = item.querySelector('.markdown-body');
  if (body.dataset.loaded) return;
  try {
    const resp = await fetch('/api/wissen/' + encodeURIComponent(filename));
    if (!resp.ok) throw new Error(resp.status);
    const text = await resp.text();
    body.innerHTML = renderMarkdown(text);
    body.dataset.loaded = '1';
  } catch {
    body.innerHTML = '<em style="color:#999">Datei konnte nicht geladen werden.</em>';
  }
}

function renderMarkdown(md) {
  // Pre-process tables before escaping
  const lines = md.split('\n');
  const processed = [];
  let i = 0;
  while (i < lines.length) {
    // Detect table: line starts with |, next line is separator |---|
    if (lines[i].trim().startsWith('|') && i + 1 < lines.length && /^\|[\s-:|]+\|$/.test(lines[i+1].trim())) {
      // Header row
      const headerCells = lines[i].split('|').filter(c => c.trim()).map(c => c.trim());
      let table = '<table><tr>' + headerCells.map(c => `<th>${c}</th>`).join('') + '</tr>';
      i += 2; // skip header + separator
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        const cells = lines[i].split('|').filter(c => c.trim()).map(c => c.trim());
        table += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
        i++;
      }
      table += '</table>';
      processed.push(table);
    } else {
      processed.push(lines[i]);
      i++;
    }
  }

  return processed.join('\n')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Restore table HTML that we pre-built
    .replace(/&lt;table&gt;/g, '<table>').replace(/&lt;\/table&gt;/g, '</table>')
    .replace(/&lt;tr&gt;/g, '<tr>').replace(/&lt;\/tr&gt;/g, '</tr>')
    .replace(/&lt;th&gt;/g, '<th>').replace(/&lt;\/th&gt;/g, '</th>')
    .replace(/&lt;td&gt;/g, '<td>').replace(/&lt;\/td&gt;/g, '</td>')
    .replace(/^&gt; (.+)/gm, '<blockquote>$1</blockquote>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^### (.+)/gm, '<h3>$1</h3>')
    .replace(/^## (.+)/gm, '<h2>$1</h2>')
    .replace(/^# (.+)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>')
    .replace(/<p><\/p>/g, '')
    .replace(/<p>(<h[1-3]>)/g, '$1')
    .replace(/(<\/h[1-3]>)<\/p>/g, '$1')
    .replace(/<p>(<table>)/g, '$1')
    .replace(/(<\/table>)<\/p>/g, '$1')
    .replace(/<p>(<ul>)/g, '$1')
    .replace(/(<\/ul>)<\/p>/g, '$1')
    .replace(/<p>(<hr>)<\/p>/g, '$1')
    .replace(/<p>(<blockquote>)/g, '$1')
    .replace(/(<\/blockquote>)<\/p>/g, '$1');
}
</script>
</body>
</html>
